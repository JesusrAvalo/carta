<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carta para mi hisho</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body class="page page-question">
  <div class="bg-overlay"></div>
  <div class="hearts-layer" id="heartsLayer" aria-hidden="true"></div>

  <main class="site-shell">
    <section class="flower-grid" aria-hidden="true">
      <div class="flower-card"><img src="assets/img/flor1.svg" alt=""></div>
      <div class="flower-card"><img src="assets/img/flor2.svg" alt=""></div>
      <div class="flower-card"><img src="assets/img/flor3.svg" alt=""></div>
      <div class="flower-card"><img src="assets/img/flor4.svg" alt=""></div>
      <div class="flower-card"><img src="assets/img/flor5.svg" alt=""></div>
      <div class="flower-card"><img src="assets/img/flor6.svg" alt=""></div>
      <div class="flower-card"><img src="assets/img/flor7.svg" alt=""></div>
      <div class="flower-card"><img src="assets/img/flor8.svg" alt=""></div>
      <div class="flower-card"><img src="assets/img/flor9.svg" alt=""></div>
    </section>

    <section class="question-wrap container d-flex align-items-center justify-content-center">
      <div class="question-card soft-glass text-center">
        <p class="eyebrow mb-2">Y ahora la pregunta que todos estábamos esperando</p>
        <h1 class="hero-title mb-3">¿Quieres ser mi novia?</h1>
        <p class="question-support mb-4">
          
        </p>

        <div id="questionActions" class="question-actions">
          <button id="yesBtn" class="btn btn-love btn-lg px-4 py-3">Sí</button>
          <button id="noBtn" class="btn btn-outline-light btn-lg px-4 py-3">No</button>
        </div>

        <p id="noText" class="response-text mt-4 d-none">
          Para qué te haces si ya sabemos que sí quieres jajajajajaj
        </p>

        <div id="yesMessage" class="yes-message d-none mt-4">
          <h2 class="mb-2">Sabía que dirías que sí :)</h2>
          <p class="mb-0">
            Siempre daré todo de mi para que seas la mujer más felíz del mundo.
          </p>
          <p class="mb-0">
            Te amo y siempre te amaré con todo mi corazón mi amor 🌻💛🌻
          </p>
        </div>
      </div>
    </section>
  </main>

  <script src="assets/js/main.js"></script>
</body>
</html>
